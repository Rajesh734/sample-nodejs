name: Deploy to Synology NAS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - non-prod
      image_version:
        description: 'Image version/tag (e.g., main-712eb90). Defaults to latest if empty.'
        required: false
        default: 'latest'
        type: string
        
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/moi-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment variables
        run: |
          # 1. Fix the lowercase image name issue
          echo "IMAGE_NAME_LC=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

          # 2. Set the Image Tag (Version)
          # Use input if provided, otherwise default to latest
          VERSION="${{ github.event.inputs.image_version }}"
          if [ -z "$VERSION" ]; then VERSION="latest"; fi
          echo "IMAGE_TAG=$VERSION" >> $GITHUB_ENV

          # 3. Map Secrets (Handle multi-line SSH Key correctly)
          echo "NAS_HOST=${{ secrets.NAS_HOST }}" >> $GITHUB_ENV
          echo "NAS_USER=${{ secrets.NAS_USER }}" >> $GITHUB_ENV
          echo "NAS_PORT=${{ secrets.NAS_PORT }}" >> $GITHUB_ENV
          
          # This is the special syntax for multi-line variables
          echo "NAS_SSH_KEY<<EOF" >> $GITHUB_ENV
          echo "${{ secrets.SYNOLOGY_SSH_PRIVATE_KEY }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # 4. Set Path based on environment
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "DEPLOY_PATH=/volume1/docker/moi" >> $GITHUB_ENV
          else
            echo "DEPLOY_PATH=/volume1/docker/moi-non-prod" >> $GITHUB_ENV
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.NAS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Add the -p flag here
          ssh-keyscan -p ${{ env.NAS_PORT }} -H ${{ env.NAS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Network Diagnostic
        run: |
          echo "Checking connectivity to ${{ env.NAS_HOST }} on port ${{ env.NAS_PORT }}..."
          nc -zv -w 5 ${{ env.NAS_HOST }} ${{ env.NAS_PORT }} || echo "Port is CLOSED or UNREACHABLE"
          
      - name: Pull latest image
        run: |
          # Adding -vvv for maximum debug output
          ssh -vvv -p ${{ env.NAS_PORT }} -i ~/.ssh/id_rsa ${{ env.NAS_USER }}@${{ env.NAS_HOST }} \
            "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ env.IMAGE_TAG }}"

      - name: Deploy services
        run: |
          ssh -p ${{ env.NAS_PORT }} -i ~/.ssh/id_rsa ${{ env.NAS_USER }}@${{ env.NAS_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            
            # Backup
            cp docker-compose.yml docker-compose.yml.backup
            
            # Stop current services
            docker-compose down || true
            
            # Update image using lowercase variable and the selected tag
            sed -i "s|image: ghcr.io.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ env.IMAGE_TAG }}|" docker-compose.yml
            
            # Start
            docker-compose up -d
            sleep 10
          EOF

      - name: Verify health check
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.NAS_USER }}@${{ env.NAS_HOST }} << 'EOF'
            # Give services time to start
            sleep 5
            
            # Check health
            RESPONSE=$(curl -s http://localhost:3000/api/health || echo '{"status":"error"}')
            echo "Health check response: $RESPONSE"
            
            # Verify response contains 'ok'
            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              echo "✅ Health check passed"
              exit 0
            else
              echo "❌ Health check failed"
              exit 1
            fi
          EOF

      - name: Check logs
        if: failure()
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.NAS_USER }}@${{ env.NAS_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            echo "=== Docker Compose Status ==="
            docker-compose ps
            echo ""
            echo "=== Recent Logs ==="
            docker-compose logs -n 20 backend || true
            echo ""
            echo "=== Database Logs ==="
            docker-compose logs -n 10 postgres || true
          EOF

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/id_rsa ${{ env.NAS_USER }}@${{ env.NAS_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            echo "Rolling back to previous version..."
            docker-compose down || true
            mv docker-compose.yml.backup docker-compose.yml
            docker-compose up -d
            sleep 10
            docker-compose ps
          EOF

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          ssh-keygen -R ${{ env.NAS_HOST }} 2>/dev/null || true

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment successful to ${{ github.event.inputs.environment }}"
          else
            echo "❌ Deployment failed to ${{ github.event.inputs.environment }}"
          fi
