version: '3.8'

services:
  backend:
    image: ghcr.io/rajesh734/sample-nodejs/moi-app:latest
    container_name: moi-backend-non-prod
    restart: always
    environment:
      # These will be filled by the 'sed' command in your workflow
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moi_user -d moi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    # Use pre-built image if available, otherwise build from Dockerfile
    image: ${DOCKER_IMAGE:-ghcr.io/rajesh734/sample-nodejs/moi-app:latest}
    # Uncomment 'build' below for local development
    # build: .
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://moi_user:moi_password@postgres:5432/moi_db
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      CALLBACK_URL: ${CALLBACK_URL:-http://localhost:3000/auth/callback}
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-/volume1/docker/moi/postgres}

